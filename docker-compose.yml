services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sdrf_studio}
      POSTGRES_USER: ${POSTGRES_USER:-sdrf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdrf}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://sdrf:sdrf@db:5432/sdrf_studio}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      STORAGE_DIR: /data/storage
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      ENABLE_CLOUD_AI: ${ENABLE_CLOUD_AI:-false}
    volumes:
      - storage_data:/data/storage
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  web:
    build:
      context: ./apps/web
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  storage_data:
